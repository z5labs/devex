name: Update Dagger

# Manually-triggered mechanical Dagger upgrade: install the target CLI, run
# `dagger develop` in every module (which bumps engineVersion + regenerates
# bindings and go.mod/go.sum), bump the ci.yml pin, and open a PR. Reproduces the
# by-hand diff of #114 (v0.20.8 -> v0.21.3) with one click.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target Dagger version: 'latest', or a pin like 0.21.7 / v0.21.7"
        required: false
        default: latest

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Dagger modules
    runs-on: ubuntu-latest
    # First `dagger develop` cold-pulls the ~633MB engine image (single job,
    # single pull -- cf. #116). Budget generously.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$INPUT" ] || [ "$INPUT" = "latest" ]; then
            TAG=$(gh release view --repo dagger/dagger --json tagName --jq '.tagName')
          else
            TAG="$INPUT"
          fi
          BARE="${TAG#v}"                 # 0.21.7  -- install.sh + ci.yml + branch
          VTAG="v${BARE}"                 # v0.21.7 -- human-facing labels
          echo "$BARE" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "unexpected version '$TAG'" >&2; exit 1; }
          echo "bare=$BARE" >> "$GITHUB_OUTPUT"
          echo "vtag=$VTAG" >> "$GITHUB_OUTPUT"

      - name: Install target Dagger CLI
        # Pin the CLI to the EXACT resolved version: `dagger develop` regenerates
        # core internal/dagger/dagger.gen.go against the running CLI's engine and
        # CI enforces a byte-exact Generated check, so a CLI even a patch off the
        # target writes mismatched churn. This workflow (not an ambient local CLI)
        # is the source of truth for the regenerated tree.
        env:
          DAGGER_VERSION: ${{ steps.resolve.outputs.bare }}
        run: |
          set -euo pipefail
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | DAGGER_VERSION="$DAGGER_VERSION" BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI version
        run: dagger version

      - name: Regenerate every module (leaf -> tests -> root)
        # tests/ load their parent module and root ci generates its
        # *-tests.gen.go from the 16 tests toolchains, so develop mains first,
        # tests next, root LAST (else root regenerates against stale deps -- the
        # java/kafka aggregator-binding concern). Glob-based discovery needs no
        # hardcoded module list and picks up modules added later automatically;
        # the [ -f ... ] guard skips any dir without a dagger.json.
        run: |
          set -euo pipefail
          for d in daggerverse/*/; do
            [ -f "${d}dagger.json" ] && dagger develop -m "$d"
          done
          for d in daggerverse/*/tests/; do
            [ -f "${d}dagger.json" ] && dagger develop -m "$d"
          done
          dagger develop -m .

      - name: Bump DAGGER_VERSION pin in ci.yml
        # ci.yml is the single source of truth (both dagger/checks steps read
        # env.DAGGER_VERSION), so one targeted sed on the bare-semver env line
        # is all that's needed -- no dagger.json edits (develop already bumped
        # every engineVersion).
        env:
          BARE: ${{ steps.resolve.outputs.bare }}
        run: |
          set -euo pipefail
          sed -i -E "s/(DAGGER_VERSION:[[:space:]]*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\1${BARE}\2/" \
            .github/workflows/ci.yml

      - name: Open upgrade PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          branch: chore/update-dagger-${{ steps.resolve.outputs.bare }}
          delete-branch: true
          commit-message: "chore(ci): upgrade Dagger to ${{ steps.resolve.outputs.vtag }} across all modules"
          title: "chore(ci): upgrade Dagger to ${{ steps.resolve.outputs.vtag }} across all modules"
          body: |
            Mechanical Dagger upgrade to `${{ steps.resolve.outputs.vtag }}`,
            generated by `.github/workflows/update-dagger.yml`. Reproduces the
            shape of #114: bumped `engineVersion` in every `dagger.json`,
            regenerated `*.gen.go`, refreshed `go.mod`/`go.sum`, and bumped the
            `DAGGER_VERSION` pin in `ci.yml`.

            > [!IMPORTANT]
            > **CI will not run automatically on this PR.** It was opened with
            > `GITHUB_TOKEN`, and GitHub does not fire `on: pull_request`
            > workflows for token-authored PRs. Nudge it to validate the
            > regenerated code: push an empty commit
            > (`git commit --allow-empty -m ci && git push`) or close & reopen
            > the PR.
