name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DAGGER_VERSION: "0.21.7"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  list:
    name: List checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      jobs: ${{ steps.route.outputs.jobs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the change-detection step can diff against the PR
          # merge-base / the push's before-SHA (see the "Select affected" step).
          fetch-depth: 0

      - name: Cache Dagger engine image
        id: engine-cache
        uses: actions/cache@v4
        with:
          path: engine.tar.gz
          key: dagger-engine-v${{ env.DAGGER_VERSION }}

      - name: Load or pull Dagger engine
        env:
          CACHE_HIT: ${{ steps.engine-cache.outputs.cache-hit }}
        run: |
          IMAGE="registry.dagger.io/engine:v${DAGGER_VERSION}"
          if [ "$CACHE_HIT" = "true" ]; then
            gunzip -c engine.tar.gz | docker load
          else
            for i in 1 2 3; do
              timeout 300 docker pull "$IMAGE" && break
              echo "engine pull attempt $i failed/timed out; retrying in 5s" >&2
              sleep 5
            done
            docker image inspect "$IMAGE" >/dev/null   # fail the job if still missing
            docker save "$IMAGE" | gzip > engine.tar.gz
          fi

      - name: Install Dagger CLI
        # Needed to `dagger call` the ci module's affected-checks function in the
        # next step. The engine image is already docker-loaded above, so this
        # provisions from the local image (no registry pull).
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | DAGGER_VERSION="$DAGGER_VERSION" BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - id: select
        # Emit the minimum set of checks a change could affect (issue #170). The
        # whole computation is the ci module's affected-checks function: it
        # enumerates the check universe AND the dependency graph from the live
        # Dagger Workspace (dag.CurrentWorkspace()), diffs base...head against the
        # workspace's .git with pure-Go go-git, and returns the affected names —
        # so there is no separate `dagger check -l` stage. This step only forwards
        # context; base/head come straight from the event (PR base/head, else the
        # push's before/after — GitHub sends all-zeros before for a new branch,
        # which the function treats as "run everything").
        #
        # A check is skipped only when it provably cannot be affected — any doubt
        # and it runs:
        #   - a change outside a daggerverse module (CI infra, ci/, root
        #     dagger.json, docs, ...) or an uncomputable diff -> the FULL suite.
        #     The one exception (#179) is a regenerated per-toolchain aggregator
        #     binding, ci/internal/dagger/<toolchain>.gen.go, which is provably
        #     owned by that toolchain and so is attributed to it;
        #   - a check whose module can't be resolved -> kept;
        #   - ci:* checks -> always run.
        # If enumeration itself fails there is no independent universe to fall back
        # to, so the step fails closed (CI blocks) rather than risk under-running.
        env:
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
          # Export this selection to Dagger Cloud so a run's check set can be
          # traced back to the decision that produced it (#180). A raw
          # `dagger call` reads the token from its environment, unlike the
          # dagger/checks action the run legs use, which takes it as a
          # cloud-token input. Empty for fork PRs -> no telemetry, no failure.
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: |
          set -euo pipefail
          jobs="$(dagger -m . call affected-checks --base="$BASE" --head="$HEAD")"
          [ -n "$jobs" ] || { echo "::error::affected-checks returned no checks"; exit 1; }
          echo "selected checks: $jobs"
          echo "checks=$jobs" >> "$GITHUB_OUTPUT"

      - id: route
        # Re-shape the (already-filtered) check list into {name, module, filter}
        # objects so each run job can load only its own tests module instead of
        # the whole ci/ aggregator. ci:* checks stay on the root module.
        env:
          CHECKS: ${{ steps.select.outputs.checks }}
        run: |
          jobs=$(jq -nc \
            --argjson checks "$CHECKS" \
            --slurpfile tcs <(jq -c '.toolchains' dagger.json) '
            ($tcs[0] // []) as $toolchains |
            # Dagger kebab-cases toolchain names and splits on letter↔digit
            # boundaries (z5labs → z-5-labs), so apply the same rule when
            # mapping the filter prefix back to its source path.
            ($toolchains | map({
              key: (.name
                | gsub("(?<a>[a-z])(?<d>[0-9])"; "\(.a)-\(.d)")
                | gsub("(?<d>[0-9])(?<a>[a-z])"; "\(.d)-\(.a)")
              ),
              value: .source
            }) | from_entries) as $module_for |
            $checks | map(
              (split(":")[0]) as $prefix |
              if $prefix == "ci" then
                { name: ., module: ".", filter: . }
              else
                { name: ., module: $module_for[$prefix], filter: ("tests:" + (split(":")[1])) }
              end
            )
          ')
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

  run:
    name: ${{ matrix.job.name }}
    needs: [list]
    runs-on: ubuntu-latest
    # Per matrix leg. Observed real legs finish in <4m; this is only a backstop
    # above the 6m dagger/checks step bound + setup, so the step's timeout is
    # what fails a telemetry-drain hang fast, not this job cap.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Burst-throttling mitigation (#125): the matrix fans out one leg per
      # check (finer-grained than the toolchain modules), so an uncapped fan-out
      # boots several dozen ephemeral engines at once that all simultaneously
      # pull Docker Hub base images (anonymous, per-IP limited via GitHub's
      # shared egress NAT) and flush OTLP telemetry to Dagger Cloud. Both
      # upstreams answer the resulting thundering herd with 504s. Cap concurrent
      # legs to spread the same load over time — remaining legs queue and start
      # as slots free. Same shape as #116's cold engine-image pull. Do NOT raise
      # this to "speed up CI" without re-checking the 504 rate.
      max-parallel: 10
      matrix:
        job: ${{ fromJSON(needs.list.outputs.jobs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Dagger engine image
        id: engine-cache
        uses: actions/cache/restore@v4
        with:
          path: engine.tar.gz
          key: dagger-engine-v${{ env.DAGGER_VERSION }}

      - name: Load or pull Dagger engine
        env:
          CACHE_HIT: ${{ steps.engine-cache.outputs.cache-hit }}
        run: |
          IMAGE="registry.dagger.io/engine:v${DAGGER_VERSION}"
          if [ "$CACHE_HIT" = "true" ]; then
            gunzip -c engine.tar.gz | docker load
          else
            for i in 1 2 3; do
              timeout 300 docker pull "$IMAGE" && break
              echo "engine pull attempt $i failed/timed out; retrying in 5s" >&2
              sleep 5
            done
            docker image inspect "$IMAGE" >/dev/null
          fi

      # Fail fast on the Dagger Cloud telemetry-drain hang. The check itself runs
      # in ~1-4m; a leg still going at 6m is almost certainly stuck draining
      # telemetry to api.dagger.cloud (upstream dagger/dagger#7048, #12178),
      # which otherwise hangs the leg until the job timeout. Bounding the step
      # makes the job fail quickly so ci-auto-rerun.yml re-runs the failed leg on
      # a fresh runner + fresh engine — the manual re-run that reliably clears a
      # transient/sustained Cloud stall (an in-process retry can't: it reuses the
      # same stuck engine and re-hits the ongoing stall). Telemetry stays on
      # (cloud-token set); we only bound how long a stuck drain may hang.
      - uses: dagger/checks@64525befa1c36dd55577dae083df5c8968d9325a # v1.1.0
        timeout-minutes: 6
        with:
          version: ${{ env.DAGGER_VERSION }}
          module: ${{ matrix.job.module }}
          filter: ${{ matrix.job.filter }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  # Single, stable status check for branch protection. Because the run matrix is
  # dynamic — and now change-aware, so unaffected legs are intentionally absent
  # (issue #170) — the per-leg check names cannot be required directly: a skipped
  # leg would leave its required check pending forever. Require ONLY "CI Gate" in
  # branch protection instead. It always runs and passes iff `list` succeeded and
  # no executed leg failed (an all-skipped `run` — impossible today since ci:*
  # always runs — is treated as success).
  gate:
    name: CI Gate
    needs: [list, run]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          LIST_RESULT: ${{ needs.list.result }}
          RUN_RESULT: ${{ needs.run.result }}
        run: |
          echo "list=$LIST_RESULT run=$RUN_RESULT"
          if [ "$LIST_RESULT" != "success" ]; then
            echo "::error::list job did not succeed"
            exit 1
          fi
          case "$RUN_RESULT" in
            success|skipped) echo "all selected checks passed" ;;
            *) echo "::error::one or more checks failed"; exit 1 ;;
          esac
