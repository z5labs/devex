name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DAGGER_VERSION: "0.21.3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  list:
    name: List checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      jobs: ${{ steps.route.outputs.jobs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Dagger engine image
        id: engine-cache
        uses: actions/cache@v4
        with:
          path: engine.tar.gz
          key: dagger-engine-v${{ env.DAGGER_VERSION }}

      - name: Load or pull Dagger engine
        env:
          CACHE_HIT: ${{ steps.engine-cache.outputs.cache-hit }}
        run: |
          IMAGE="registry.dagger.io/engine:v${DAGGER_VERSION}"
          if [ "$CACHE_HIT" = "true" ]; then
            gunzip -c engine.tar.gz | docker load
          else
            for i in 1 2 3; do
              timeout 300 docker pull "$IMAGE" && break
              echo "engine pull attempt $i failed/timed out; retrying in 5s" >&2
              sleep 5
            done
            docker image inspect "$IMAGE" >/dev/null   # fail the job if still missing
            docker save "$IMAGE" | gzip > engine.tar.gz
          fi

      - id: list
        uses: dagger/checks@64525befa1c36dd55577dae083df5c8968d9325a # v1.1.0
        with:
          version: ${{ env.DAGGER_VERSION }}
          list: "true"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - id: route
        # Re-shape the bare check list into {name, module, filter} objects so
        # each run job can load only its own tests module instead of the whole
        # ci/ aggregator (10 toolchains → 2 modules per job). ci:* checks stay
        # on the root module.
        env:
          CHECKS: ${{ steps.list.outputs.checks }}
        run: |
          jobs=$(jq -nc \
            --argjson checks "$CHECKS" \
            --slurpfile tcs <(jq -c '.toolchains' dagger.json) '
            ($tcs[0] // []) as $toolchains |
            # Dagger kebab-cases toolchain names and splits on letter↔digit
            # boundaries (z5labs → z-5-labs), so apply the same rule when
            # mapping the filter prefix back to its source path.
            ($toolchains | map({
              key: (.name
                | gsub("(?<a>[a-z])(?<d>[0-9])"; "\(.a)-\(.d)")
                | gsub("(?<d>[0-9])(?<a>[a-z])"; "\(.d)-\(.a)")
              ),
              value: .source
            }) | from_entries) as $module_for |
            $checks | map(
              (split(":")[0]) as $prefix |
              if $prefix == "ci" then
                { name: ., module: ".", filter: . }
              else
                { name: ., module: $module_for[$prefix], filter: ("tests:" + (split(":")[1])) }
              end
            )
          ')
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

  run:
    name: ${{ matrix.job.name }}
    needs: [list]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.list.outputs.jobs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Dagger engine image
        id: engine-cache
        uses: actions/cache/restore@v4
        with:
          path: engine.tar.gz
          key: dagger-engine-v${{ env.DAGGER_VERSION }}

      - name: Load or pull Dagger engine
        env:
          CACHE_HIT: ${{ steps.engine-cache.outputs.cache-hit }}
        run: |
          IMAGE="registry.dagger.io/engine:v${DAGGER_VERSION}"
          if [ "$CACHE_HIT" = "true" ]; then
            gunzip -c engine.tar.gz | docker load
          else
            for i in 1 2 3; do
              timeout 300 docker pull "$IMAGE" && break
              echo "engine pull attempt $i failed/timed out; retrying in 5s" >&2
              sleep 5
            done
            docker image inspect "$IMAGE" >/dev/null
          fi

      - uses: dagger/checks@64525befa1c36dd55577dae083df5c8968d9325a # v1.1.0
        with:
          version: ${{ env.DAGGER_VERSION }}
          module: ${{ matrix.job.module }}
          filter: ${{ matrix.job.filter }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
